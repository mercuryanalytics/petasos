require:
  - rubocop-rails

AllCops:
  TargetRubyVersion: 2.5
  TargetRailsVersion: 6.0
  NewCops: enable
  Exclude:
    - "bin/*"
    - "db/schema.rb"
    - "lib/tasks/cucumber.rake"
    - "sandbox/**/*"
    - "public/dispatch.rb"

Rails:
  Enabled: true

Rails/SkipsModelValidations:
  Exclude:
    - "db/migrate/*"

Bundler/OrderedGems:
  Enabled: false

Metrics:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  Enabled: false

Style/BlockComments:
  Enabled: false
  Exclude:
    - "config/routes.rb"

Style/RegexpLiteral:
  EnforcedStyle: percent_r
  AllowInnerSlashes: false
  Exclude:
    - "features/**/*"

Style/BarePercentLiterals:
  EnforcedStyle: percent_q

Lint/AmbiguousRegexpLiteral:
  Exclude:
    - "features/**/*"

Layout/SpaceInsideBlockBraces:
  SpaceBeforeBlockParameters: false

Layout/LineLength:
  Enabled: false

Naming/MethodParameterName:
  Enabled: false

# The codebase uses numbered identifiers under both conventions for external
# reasons that rule out either EnforcedStyle: snake_case DB columns
# (mailing_address_1, billing_address_2, ...) AND normalcase brand/version names
# (:auth0, :v1). No single style fits, and none of them can be renamed, so the
# cop is disabled rather than fighting legitimate domain names.
Naming/VariableNumber:
  Enabled: false

Naming/FileName:
  Exclude:
    - "config/initializers/rswag-api.rb"
    - "config/initializers/rswag-ui.rb"
